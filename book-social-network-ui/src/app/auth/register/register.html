<div class="container-fluid min-vh-100 py-5" style="
    background-image:
      linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
      url('assets/register.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
  ">
  <div class="auth-wrapper">

    <div class="auth-card shadow-lg">

      <div class="text-center mb-4">
        <h1 class="brand-title">📚 Book Social Network</h1>
        <p class="text-muted">Create your account and join the community.</p>
      </div>

      <form (ngSubmit)="register()">

        <!-- FULL NAME -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Full Name</label>
          <input type="text" class="form-control form-control-lg" [(ngModel)]="fullName" name="fullName"
            placeholder="Enter your full name" required>
        </div>

        <!-- EMAIL -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Email Address</label>
          <input type="email" class="form-control form-control-lg" [(ngModel)]="email" name="email"
            placeholder="Enter your email" required>
        </div>

        <!-- PASSWORD -->
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" class="form-control form-control-lg" [(ngModel)]="password" name="password"
            placeholder="Create password" required>
        </div>

        <!-- REGISTER BUTTON -->
        <button type="submit" class="btn btn-success w-100 btn-lg shadow-sm">
          🚀 Register
        </button>

      </form>

      <!-- LOGIN LINK -->
      <div class="text-center mt-4">
        <span class="text-muted">Already registered?</span>

        <a routerLink="/login" class="fw-bold text-decoration-none ms-1">
          Login Here
        </a>
      </div>

    </div>

  </div>
