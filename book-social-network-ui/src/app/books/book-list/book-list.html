<div
  class="container-fluid min-vh-100 py-5"
  style="
    background-image:
      linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
      url('assets/book.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
  "
>

  <div class="container">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">

      <!-- LEFT -->
      <div>

        <span class="badge bg-warning text-dark px-3 py-2 rounded-pill mb-3 shadow">
          {{ isAdmin ? '👑 ADMIN PANEL' : '👤 USER PANEL' }}
        </span>

        <h1 class="fw-bold text-white display-6 mb-2">
          📚 Your Book Collection
        </h1>

        <p class="text-light fs-5 mb-0">
          Manage, borrow and organize your books professionally.
        </p>

      </div>

      <!-- RIGHT -->
      <div class="d-flex gap-3">

        <a
          class="btn btn-primary btn-lg rounded-pill shadow px-4"
          routerLink="/add-book">

          ➕ Add Book

        </a>

        <button
          class="btn btn-danger btn-lg rounded-pill shadow px-4"
          (click)="logout()">

           Logout

        </button>

      </div>

    </div>

    <!-- CARD -->
    <div class="card border-0 shadow-lg rounded-4 overflow-hidden">

      <!-- TABLE -->
      <div class="table-responsive">

        <table class="table table-hover align-middle mb-0">

          <thead class="table-dark">

            <tr class="py-3">
              <th>📖 Title</th>
              <th>✍ Author</th>
              <th>📝 Description</th>
              <th>📌 Status</th>
              <th>👤 Borrowed By</th>
              <th class="text-center">⚡ Actions</th>
            </tr>

          </thead>

          <tbody>

            <tr *ngFor="let b of books">

              <!-- TITLE -->
              <td class="fw-bold text-primary">
                {{ b.title }}
              </td>

              <!-- AUTHOR -->
              <td>
                {{ b.author }}
              </td>

              <!-- DESCRIPTION -->
              <td class="text-muted">
                {{ b.description }}
              </td>

              <!-- STATUS -->
              <td>

                <span
                  *ngIf="b.available"
                  class="badge bg-success rounded-pill px-3 py-2">

                   Available

                </span>

                <span
                  *ngIf="!b.available"
                  class="badge bg-danger rounded-pill px-3 py-2">

                   Borrowed

                </span>

              </td>

              <!-- BORROWED USER -->
              <td>

                <span
                  *ngIf="b.borrowedByName; else none"
                  class="fw-semibold text-dark">

                  👤 {{ b.borrowedByName }}

                </span>

                <ng-template #none>

                  <span class="text-secondary">
                    —
                  </span>

                </ng-template>

              </td>

              <!-- ACTIONS -->
              <td class="text-center">

                <div class="d-flex flex-wrap gap-2 justify-content-center">

                  <!-- BORROW -->
                  <button
                    *ngIf="b.available"
                    class="btn btn-success btn-sm rounded-pill px-3 shadow-sm"
                    (click)="borrow(b.id!)">

                    📥 Borrow

                  </button>

                  <!-- RETURN -->
                  <button
                    *ngIf="!b.available"
                    class="btn btn-warning btn-sm rounded-pill px-3 shadow-sm"
                    (click)="returnBook(b.id!)">

                    🔁 Return

                  </button>

                  <!-- ADMIN ONLY -->
                  <button
                    *ngIf="isAdmin"
                    class="btn btn-primary btn-sm rounded-pill px-3 shadow-sm"
                    (click)="edit(b.id!)">

                    ✏ Edit

                  </button>

                  <button
                    *ngIf="isAdmin"
                    class="btn btn-danger btn-sm rounded-pill px-3 shadow-sm"
                    (click)="delete(b.id!)">

                    🗑 Delete

                  </button>

                </div>

              </td>

            </tr>

          </tbody>

        </table>

      </div>

    </div>

  </div>

</div>
