<div
  class="container-fluid min-vh-100 py-5"
  style="
    background-image:
      linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
      url('assets/edit-book.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
  "
>
<div class="edit-page" *ngIf="!loading; else loadTpl">

  <div class="edit-card">

    <!-- HEADER -->
    <div class="text-center mb-5">

      <div class="book-icon">
        📚
      </div>

      <h1 class="edit-title">
        Edit Book Details
      </h1>

      <p class="edit-subtitle">
        Update your book information beautifully and professionally.
      </p>

    </div>

    <!-- FORM -->
    <form>

      <!-- TITLE -->
      <div class="form-group mb-4">

        <label class="custom-label">
          Book Title
        </label>

        <div class="input-wrapper">
          <span class="input-icon">📖</span>

          <input
            type="text"
            class="custom-input"
            [(ngModel)]="book.title"
            name="title"
            placeholder="Enter book title"
            required>
        </div>

      </div>

      <!-- AUTHOR -->
      <div class="form-group mb-4">

        <label class="custom-label">
          Author Name
        </label>

        <div class="input-wrapper">
          <span class="input-icon">✍️</span>

          <input
            type="text"
            class="custom-input"
            [(ngModel)]="book.author"
            name="author"
            placeholder="Enter author name"
            required>
        </div>

      </div>

      <!-- DESCRIPTION -->
      <div class="form-group mb-4">

        <label class="custom-label">
          Description
        </label>

        <textarea
          class="custom-textarea"
          rows="5"
          [(ngModel)]="book.description"
          name="description"
          placeholder="Write a beautiful description about this book...">
        </textarea>

      </div>

      <!-- BUTTONS -->
      <div class="button-group mt-5">

        <button
          class="back-btn"
          routerLink="/books"
          type="button">

          ⬅ Back

        </button>

        <button
          class="save-btn"
          type="button"
          (click)="save()"
          [disabled]="saving">

          <span *ngIf="!saving">💾 Save Changes</span>
          <span *ngIf="saving">⏳ Saving...</span>

        </button>

      </div>

    </form>

  </div>

</div>

<!-- LOADING -->
<ng-template #loadTpl>

  <div class="loading-wrapper">

    <div class="loader-card">

      <div class="spinner-border text-light mb-3"
           style="width:4rem;height:4rem;"
           role="status">
      </div>

      <h3 class="text-white">
        Loading Book...
      </h3>

    </div>

  </div>

</ng-template>
